version: '3.8'

services:
  cat62-parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cat62-parser
    restart: unless-stopped
    
    # Port mappings
    ports:
      - "7878:7878"     # HTTP web UI
      - "8765:8765"     # WebSocket
      - "31002:31002/udp"  # Radar UDP input
    
    # Environment variables
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    
    # Resource limits
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        cpus: '0.5'
        memory: 256M
    
    # Volumes
    volumes:
      - ./client:/app/client:ro
      - /var/log/cat62:/app/logs
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7878/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network
    networks:
      - radar-network

networks:
  radar-network:
    driver: bridge
